<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Bible hors-ligne — lecture, Strong, références croisées</title>
<meta name="description" content="Lecteur de Bible 100 % hors-ligne et gratuit : 4 traductions, interlinéaire Strong hébreu/grec, références croisées, plan de lecture, notes, lecture audio. Accessible RGAA/WCAG.">
<meta name="theme-color" content="#0f1115">
<link rel="canonical" href="https://hexapost-studio.github.io/bible-offline/">
<!-- Open Graph / partage social -->
<meta property="og:type" content="website">
<meta property="og:title" content="Bible hors-ligne">
<meta property="og:description" content="4 traductions, interlinéaire Strong, références croisées, plan de lecture, notes. 100 % hors-ligne et accessible.">
<meta property="og:image" content="https://hexapost-studio.github.io/bible-offline/social.png">
<meta property="og:url" content="https://hexapost-studio.github.io/bible-offline/">
<meta name="twitter:card" content="summary_large_image">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a class="skip" href="#reader">Aller au contenu</a>

<header>
  <span class="brand"><img src="icon.svg" alt=""><span>Bible</span></span>
  <select id="version" aria-label="Traduction"></select>
  <select id="cmpVersion" aria-label="Comparer avec" hidden></select>
  <select id="book" aria-label="Livre"></select>
  <select id="chapter" aria-label="Chapitre"></select>
  <span class="spacer"></span>
  <label class="visually-hidden" for="search">Rechercher dans le texte</label>
  <input id="search" type="search" placeholder="Rechercher…" aria-label="Rechercher dans le texte">
  <button id="home" class="icon-btn" aria-label="Accueil">🏠</button>
  <button id="compare" class="icon-btn" aria-pressed="false" aria-label="Comparer deux traductions">⇄</button>
  <button id="favs" class="icon-btn" aria-label="Favoris, surlignages et notes">★</button>
  <button id="dico" class="icon-btn" aria-label="Dictionnaire Strong">📚</button>
  <button id="study" class="icon-btn" aria-label="Étude biblique en profondeur">🔬</button>
  <button id="plan" class="icon-btn" aria-label="Plan de lecture">🗓</button>
  <button id="settings" class="icon-btn" aria-label="Réglages">⚙️</button>
</header>

<main id="main">
  <article class="reader" id="reader" tabindex="-1" aria-live="polite" aria-busy="false">
    <p class="muted">Chargement…</p>
  </article>
</main>
<footer>Domaine public · 100 % hors-ligne · accessible au clavier. Le n° d'un verset = annoter ; en KJV, un mot = son sens hébreu/grec.</footer>

<!-- popover annotation -->
<div id="pop" class="pop" role="menu" aria-label="Actions sur le verset">
  <button class="c1" data-a="hl" data-c="1" role="menuitem" aria-label="Surligner en jaune"></button>
  <button class="c2" data-a="hl" data-c="2" role="menuitem" aria-label="Surligner en vert"></button>
  <button class="c3" data-a="hl" data-c="3" role="menuitem" aria-label="Surligner en bleu"></button>
  <button class="c4" data-a="hl" data-c="4" role="menuitem" aria-label="Surligner en rose"></button>
  <button class="cx" data-a="hl" data-c="0" role="menuitem" aria-label="Effacer le surlignage">✕</button>
  <button class="cm" data-a="note" role="menuitem" aria-label="Ajouter ou modifier une note">📝</button>
  <button class="cp" data-a="copy" role="menuitem" aria-label="Copier ou partager le verset">📋</button>
  <button class="cr" data-a="xref" role="menuitem" aria-label="Références croisées">🔗</button>
  <button class="ct" data-a="topic" role="menuitem" aria-label="Classer le verset par thème">🏷</button>
  <button class="cn" data-a="trail" role="menuitem" aria-label="Étudier ce verset en parcours">🧭</button>
  <button class="ca" data-a="playfrom" role="menuitem" aria-label="Lire à voix haute à partir de ce verset">🔊</button>
</div>
<!-- popover Strong -->
<div id="spop" class="pop" role="dialog" aria-label="Définition Strong"></div>

<input type="file" id="importFile" accept="application/json" hidden>

<script src="lib.js"></script>
<script src="data-online.js"></script>
<script src="app.js"></script>
<script>
/* Service worker : hors-ligne (http/https uniquement, no-op en file://) */
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
</body>
</html>
