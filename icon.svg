      <line x1="-150" y1="-96" x2="-44" y2="-100"/>
      <line x1="-150" y1="-56" x2="-44" y2="-60"/>
      <line x1="-150" y1="-16" x2="-44" y2="-20"/>
      <line x1="44" y1="-100" x2="150" y2="-96"/>
      <line x1="44" y1="-60" x2="150" y2="-56"/>
